openapi: 3.1.0
info:
  title: AionSite Leads API
  description: API para gestionar prospectos y outreach de AionSite
  version: 1.0.0

servers:
  - url: https://aionsite-leads.vercel.app

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    Prospect:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        contactName:
          type: string
        city:
          type: string
        email:
          type: string
        phone:
          type: string
        type:
          type: string
        website:
          type: string
        rating:
          type: string
        mapsUrl:
          type: string
        opportunity:
          type: string
        recommendedSite:
          type: string
        pitchAngle:
          type: string
        subject:
          type: string
        message:
          type: string
        contacted:
          type: boolean
        lastContactedAt:
          type: string
          format: date-time
          nullable: true
        followupCount:
          type: integer
        followupStage:
          type: integer
        status:
          type: string
          enum:
            - generated
            - analyzed
            - approved
            - ready
            - contacted
            - replied
            - closed
            - rejected
        score:
          type: integer
        priority:
          type: string
          enum:
            - alto
            - medio
            - bajo
        source:
          type: string
        createdAt:
          type: string
          format: date-time
        lastCheckedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        businessStatus:
          type: string
        lastError:
          type: string
        lastMessageId:
          type: string
        runId:
          type: string
          nullable: true
      required:
        - id
        - name
        - city
        - type
        - status

    ProspectCreateInput:
      type: object
      properties:
        name:
          type: string
        contactName:
          type: string
        city:
          type: string
        email:
          type: string
        phone:
          type: string
        type:
          type: string
        website:
          type: string
      required:
        - name
        - city
        - type

    ProspectUpdateInput:
      type: object
      properties:
        name:
          type: string
        contactName:
          type: string
        city:
          type: string
        email:
          type: string
        phone:
          type: string
        type:
          type: string
        website:
          type: string
        rating:
          type: string
        mapsUrl:
          type: string
        opportunity:
          type: string
        recommendedSite:
          type: string
        pitchAngle:
          type: string
        subject:
          type: string
        message:
          type: string
        contacted:
          type: boolean
        lastContactedAt:
          type: string
          format: date-time
          nullable: true
        followupCount:
          type: integer
        followupStage:
          type: integer
        businessStatus:
          type: string
        source:
          type: string

    MessageRequest:
      type: object
      properties:
        type:
          type: string
          enum:
            - first_contact
            - followup
            - followup_1
            - followup_2
            - followup_3
            - closing

    SendRequest:
      type: object
      properties:
        subject:
          type: string
        message:
          type: string
      required:
        - subject
        - message

    ProspectListResponse:
      type: object
      properties:
        ok:
          type: boolean
        items:
          type: array
          items:
            $ref: "#/components/schemas/Prospect"
        count:
          type: integer
      required:
        - ok
        - items
        - count

    ProspectResponse:
      type: object
      properties:
        ok:
          type: boolean
        item:
          $ref: "#/components/schemas/Prospect"
      required:
        - ok
        - item

    MessageResponse:
      type: object
      properties:
        ok:
          type: boolean
        type:
          type: string
        subject:
          type: string
        message:
          type: string
        analysis:
          type: string
        opportunity:
          type: string
        item:
          $ref: "#/components/schemas/Prospect"
      required:
        - ok
        - type
        - subject
        - message
        - analysis
        - opportunity

    ActionResponse:
      type: object
      properties:
        ok:
          type: boolean
        result:
          type: object
          additionalProperties: true
      required:
        - ok
        - result

    Run:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
        searchesCount:
          type: integer
        placesFound:
          type: integer
        duplicatesFiltered:
          type: integer
        emailsFound:
          type: integer
        prospectsSaved:
          type: integer
        googlePlacesRequests:
          type: integer
        websiteFetches:
          type: integer
        status:
          type: string
        error:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    RunsResponse:
      type: object
      properties:
        ok:
          type: boolean
        items:
          type: array
          items:
            $ref: "#/components/schemas/Run"
        count:
          type: integer
      required:
        - ok
        - items
        - count

security:
  - bearerAuth: []

paths:
  /api/prospects:
    get:
      operationId: getProspects
      summary: Obtener lista de prospectos
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Lista de prospectos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProspectListResponse"

    post:
      operationId: createProspect
      summary: Crear prospecto manual
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProspectCreateInput"
      responses:
        "200":
          description: Prospecto creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProspectResponse"

  /api/prospects/{id}:
    get:
      operationId: getProspectById
      summary: Obtener un prospecto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prospecto encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProspectResponse"

    patch:
      operationId: updateProspect
      summary: Actualizar prospecto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProspectUpdateInput"
      responses:
        "200":
          description: Prospecto actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProspectResponse"

    delete:
      operationId: deleteProspect
      summary: Eliminar prospecto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prospecto eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /api/prospects/{id}/approve:
    post:
      operationId: approveProspect
      summary: Aprobar prospecto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prospecto aprobado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /api/prospects/{id}/reject:
    post:
      operationId: rejectProspect
      summary: Rechazar prospecto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prospecto rechazado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /api/prospects/{id}/message:
    post:
      operationId: generateMessage
      summary: Generar mensaje de outreach
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageRequest"
      responses:
        "200":
          description: Mensaje generado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/prospects/{id}/send:
    post:
      operationId: sendEmail
      summary: Enviar correo a prospecto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendRequest"
      responses:
        "200":
          description: Correo enviado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /api/runs:
    get:
      operationId: getRuns
      summary: Obtener ejecuciones de búsqueda
      responses:
        "200":
          description: Lista de runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunsResponse"

  /api/runs/execute:
    post:
      operationId: executeRun
      summary: Ejecutar búsqueda de leads
      responses:
        "200":
          description: Búsqueda ejecutada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"
